<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a3a6e">
<link rel="manifest" href="manifest.json">
<title>KIMAC — เข้าสู่ระบบ</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Sarabun',sans-serif;
  background:linear-gradient(160deg,#0d1b35 0%,#1a2a50 60%,#0d1b35 100%)}
body{display:flex;align-items:center;justify-content:center;
  min-height:100vh;min-height:-webkit-fill-available;
  padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom)}
.card{background:#fff;border-radius:24px;padding:32px 28px 28px;
  width:100%;max-width:380px;box-shadow:0 24px 64px rgba(0,0,0,.4)}
.logo-area{text-align:center;margin-bottom:18px}
.logo-area img{width:90px;height:65px;object-fit:contain;
  background:#f0f4ff;border-radius:8px;padding:4px}
.logo-area img.broken{display:none}
.logo-placeholder{width:90px;height:65px;background:linear-gradient(135deg,#1a3a6e,#2a5298);
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:800;color:#f9c900;letter-spacing:2px;margin:0 auto}
.brand{font-size:24px;font-weight:800;color:#1a3a6e;letter-spacing:3px;margin-top:6px}
.tagline{font-size:11px;color:#888;margin-top:2px}
.divider{height:2px;background:linear-gradient(90deg,transparent,#f9c900,transparent);margin:16px 0}
.tabs{display:flex;background:#f0f4ff;border-radius:10px;padding:3px;margin-bottom:18px;gap:3px}
.tab{flex:1;padding:8px;border:none;background:transparent;border-radius:7px;
  font-family:'Sarabun',sans-serif;font-size:13px;font-weight:600;
  color:#888;cursor:pointer;transition:all .2s}
.tab.on{background:#1a3a6e;color:#fff;box-shadow:0 2px 8px rgba(26,58,110,.3)}
label{display:block;font-size:11px;font-weight:700;color:#1a3a6e;margin-bottom:5px;letter-spacing:.5px}
input{width:100%;padding:12px 14px;border:2px solid #e8eef8;border-radius:10px;
  font-family:'Sarabun',sans-serif;font-size:15px;color:#1a1a2e;
  background:#f8faff;outline:none;-webkit-appearance:none;transition:border-color .2s}
input:focus{border-color:#1a3a6e;background:#fff}
.fg{margin-bottom:13px}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#1a3a6e,#2a5298);
  color:#fff;border:none;border-radius:10px;
  font-family:'Sarabun',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;box-shadow:0 4px 15px rgba(26,58,110,.3);transition:opacity .15s}
.btn:active{opacity:.8}
.btn:disabled{background:#94a3b8;box-shadow:none;cursor:not-allowed}
.alert{padding:10px 12px;border-radius:8px;font-size:13px;font-weight:600;
  margin-bottom:14px;display:none}
.alert.show{display:block}
.err{background:#fff0f0;color:#dc2626;border:1px solid #fecaca}
.ok{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo-area">
    <img id="logoImg" src="" alt="KIMAC" onerror="this.style.display='none';document.getElementById('logoPH').style.display='flex'">
    <div class="logo-placeholder" id="logoPH" style="display:none">KIMAC</div>
    <div class="brand">KIMAC</div>
    <div class="tagline">ระบบบันทึกงานบริการ</div>
  </div>
  <div class="divider"></div>
  <div class="tabs">
    <button class="tab on" onclick="sw('login')">เข้าสู่ระบบ</button>
    <button class="tab" onclick="sw('reg')">สมัครสมาชิก</button>
  </div>
  <div id="alert" class="alert"></div>

  <div id="fLogin">
    <div class="fg"><label>อีเมล</label><input type="email" id="em" placeholder="email@example.com" autocomplete="email"></div>
    <div class="fg"><label>รหัสผ่าน</label><input type="password" id="pw" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn" id="btnL" onclick="doLogin()">เข้าสู่ระบบ</button>
  </div>

  <div id="fReg" style="display:none">
    <div class="fg"><label>ชื่อ-นามสกุล</label><input type="text" id="rn" placeholder="ชื่อช่างผู้ให้บริการ"></div>
    <div class="fg"><label>อีเมล</label><input type="email" id="re" placeholder="email@example.com"></div>
    <div class="fg"><label>รหัสผ่าน (อย่างน้อย 6 ตัว)</label><input type="password" id="rp" placeholder="••••••••"></div>
    <div class="fg"><label>เบอร์โทรศัพท์</label><input type="tel" id="rt" placeholder="08x-xxx-xxxx"></div>
    <button class="btn" id="btnR" onclick="doReg()">สมัครสมาชิก</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB=supabase.createClient('https://mnzzvyugefbpphklkvwr.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1uenp2eXVnZWZicHBoa2xrdndyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MDY0ODMsImV4cCI6MjA5NTE4MjQ4M30.6qWvu2BI6UAqE4fmbBTxHtcGUEgcMS1Bj3nVDBN0A10');

// Load logo with fallback
(function(){
  const d=document.getElementById('LD');
  const img=document.getElementById('logoImg');
  const ph=document.getElementById('logoPH');
  if(d&&d.textContent.trim()&&img){
    img.src='data:image/jpeg;base64,'+d.textContent.trim();
    img.style.display='block';
    ph.style.display='none';
  } else {
    img.style.display='none';
    ph.style.display='flex';
  }
})();

if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
SB.auth.getSession().then(({data:{session}})=>{if(session)location.href='history.html';});

function sw(t){
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('on',(t==='login'&&i===0)||(t==='reg'&&i===1)));
  document.getElementById('fLogin').style.display=t==='login'?'':'none';
  document.getElementById('fReg').style.display=t==='reg'?'':'none';
  document.getElementById('alert').className='alert';
}
function msg(m,tp){const e=document.getElementById('alert');e.textContent=m;e.className='alert show '+(tp==='ok'?'ok':'err');}

async function doLogin(){
  const em=document.getElementById('em').value.trim();
  const pw=document.getElementById('pw').value;
  if(!em||!pw){msg('กรุณากรอกอีเมลและรหัสผ่าน');return;}
  const btn=document.getElementById('btnL');
  btn.innerHTML='<span class="spin"></span> กำลังเข้าสู่ระบบ...';btn.disabled=true;
  const{error}=await SB.auth.signInWithPassword({email:em,password:pw});
  if(error){msg(error.message.includes('Invalid')?'อีเมลหรือรหัสผ่านไม่ถูกต้อง':error.message);btn.innerHTML='เข้าสู่ระบบ';btn.disabled=false;}
  else{msg('✅ เข้าสู่ระบบสำเร็จ!','ok');setTimeout(()=>location.href='history.html',600);}
}
async function doReg(){
  const n=document.getElementById('rn').value.trim();
  const e=document.getElementById('re').value.trim();
  const p=document.getElementById('rp').value;
  const t=document.getElementById('rt').value.trim();
  if(!n||!e||!p){msg('กรุณากรอกข้อมูลให้ครบ');return;}
  if(p.length<6){msg('รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร');return;}
  const btn=document.getElementById('btnR');
  btn.innerHTML='<span class="spin"></span> กำลังสมัคร...';btn.disabled=true;
  const{error}=await SB.auth.signUp({email:e,password:p,options:{data:{full_name:n,phone:t}}});
  if(error){msg(error.message);btn.innerHTML='สมัครสมาชิก';btn.disabled=false;}
  else{msg('✅ สมัครสำเร็จ! กรุณา Login','ok');btn.innerHTML='สมัครสมาชิก';btn.disabled=false;setTimeout(()=>sw('login'),1500);}
}
document.addEventListener('keydown',e=>{if(e.key==='Enter'){document.getElementById('fLogin').style.display!=='none'?doLogin():doReg();}});
</script>
</body>
